<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日語假名 & 語音規則互動字卡</title>
    <!-- 引入獨立的 CSS 樣式表 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>日語假名 & 語音規則隨身卡</h1>
        <p>涵蓋五十音、濁音、半濁音、拗音、促音與長音規則</p>
    </header>

    <!-- 分類過濾選單 -->
    <div class="filter-container" id="filterContainer">
        <button class="filter-btn active" onclick="filterCards('全部', event)">全部 (<span id="count-全部">0</span>)</button>
        <button class="filter-btn" onclick="filterCards('平假名', event)">平假名 (<span id="count-平假名">0</span>)</button>
        <button class="filter-btn" onclick="filterCards('片假名', event)">片假名 (<span id="count-片假名">0</span>)</button>
        <button class="filter-btn" onclick="filterCards('濁音', event)">濁音 (<span id="count-濁音">0</span>)</button>
        <button class="filter-btn" onclick="filterCards('半濁音', event)">半濁音 (<span id="count-半濁音">0</span>)</button>
        <button class="filter-btn" onclick="filterCards('拗音', event)">拗音 (<span id="count-拗音">0</span>)</button>
        <button class="filter-btn" onclick="filterCards('促音', event)">促音 (<span id="count-促音">0</span>)</button>
        <button class="filter-btn" onclick="filterCards('長音', event)">長音 (<span id="count-長音">0</span>)</button>
    </div>

    <!-- 字卡渲染區域 -->
    <div class="card-area" onclick="flipCard()">
        <div class="flashcard" id="cardElement">
            <!-- 卡片正面 -->
            <div class="card-face card-front">
                <div class="badge" id="cardTypeBadge">分類</div>
                <div class="kana-display" id="kanaFront">載入中...</div>
                <div class="hint-text">點擊卡片看背面答案與字源</div>
            </div>
            <!-- 卡片背面 -->
            <div class="card-face card-back" onclick="event.stopPropagation();">
                <div style="width: 100%;">
                    <div class="info-row" style="display: flex; justify-content: space-between; align-items: baseline;">
                        <div>
                            <div class="info-label">羅馬拼音 / 發音</div>
                            <div class="info-value romaji-val" id="romajiBack">-</div>
                        </div>
                        <div class="badge" id="cardTypeBadgeBack" style="position:static;">分類</div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-label" id="originLabel">根源漢字</div>
                        <div class="info-value" id="originBack">-</div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-label" id="reasonLabel">字形演變原因</div>
                        <div class="info-value" id="reasonBack">-</div>
                    </div>
                    
                    <div class="info-row">
                        <div class="info-label">單字範例 / 情境</div>
                        <div class="info-value" id="exampleBack">-</div>
                    </div>
                </div>

                <!-- 語音朗讀按鈕 -->
                <div class="audio-section">
                    <button class="audio-btn" onclick="playTTS()">
                        🔊 播放假名發音
                    </button>
                    <button class="audio-btn" style="background:#efebe9; color:#5d4037;" onclick="playExampleTTS()">
                        🔊 播放範例單字
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 控制列 -->
    <div class="controls">
        <button class="btn-ctrl" onclick="prevCard(event)">←</button>
        <span class="progress-text" id="progressText">0 / 0</span>
        <button class="btn-ctrl" onclick="nextCard(event)">→</button>
    </div>

    <div class="keyboard-shortcuts">
        鍵盤快捷鍵：【空白鍵】翻轉卡片 | 【左/右方向鍵】切換上下張卡
    </div>

    <script>
        let fullDatabase = [];       // 用於存放從 JSON 讀取進來的完整資料
        let currentFilteredList = [];// 存放目前過濾分類後的資料
        let currentIndex = 0;

        // 核心功能：非同步讀取本地/網路 JSON 檔案
        async function fetchDatabase() {
            try {
                const response = await fetch('data/japanese-kana.json');
                if (!response.ok) throw new Error('讀取 JSON 檔案失敗');
                fullDatabase = await response.json();
                
                // 初始化資料
                currentFilteredList = [...fullDatabase];
                updateCategoryCounts();
                loadCard();
            } catch (error) {
                console.error(error);
                document.getElementById('kanaFront').innerText = "載入失敗";
                alert("無法載入資料庫，請確認 data/japanese-kana.json 路徑是否正確。");
            }
        }

         // 計算各類別總數並動態寫入按鈕
        function updateCategoryCounts() {
            const categories = ['全部', '平假名', '片假名', '濁音', '半濁音', '拗音', '促音', '長音'];
            categories.forEach(cat => {
                const count = cat === '全部' ? fullDatabase.length : fullDatabase.filter(item => item.type === cat).length;
                document.getElementById(`count-${cat}`).innerText = count;
            });
        }

        // 卡片翻轉
        function flipCard() {
            if (currentFilteredList.length === 0) return;
            document.getElementById('cardElement').classList.toggle('is-flipped');
        }

        // 載入當前索引之字卡數據
        function loadCard() {
            if(currentFilteredList.length === 0) {
                document.getElementById('kanaFront').innerText = "無資料";
                document.getElementById('romajiBack').innerText = "-";
                document.getElementById('originBack').innerText = "-";
                document.getElementById('reasonBack').innerText = "-";
                document.getElementById('exampleBack').innerText = "-";
                document.getElementById('progressText').innerText = "0 / 0";
                return;
            }

            const item = currentFilteredList[currentIndex];
            
            // 重設卡片至正面狀態
            document.getElementById('cardElement').classList.remove('is-flipped');

            // 寫入正面
            document.getElementById('cardTypeBadge').innerText = item.type;
            document.getElementById('kanaFront').innerText = item.kana;

            // 寫入背面
            document.getElementById('cardTypeBadgeBack').innerText = item.type;
            document.getElementById('romajiBack').innerText = item.romaji;
            document.getElementById('originBack').innerText = item.origin;
            document.getElementById('reasonBack').innerText = item.reason;
            
            // 處理部分單字缺少說明或有不同欄位名稱的彈性防呆
            const displayExJp = item.exJp || "";
            const displayExTw = item.exTw || item.Disk || "";
            document.getElementById('exampleBack').innerText = displayExJp && displayExTw ? `${displayExJp} — ${displayExTw}` : "暫無範例";

            // 動態調整標題 (促音與長音適用規則，非傳統字源)
            if (item.type === "促音" || item.type === "長音") {
                document.getElementById('originLabel').innerText = "結構 / 音變來源";
                document.getElementById('reasonLabel').innerText = "規則使用時機說明";
            } else {
                document.getElementById('originLabel').innerText = "根源漢字";
                document.getElementById('reasonLabel').innerText = "字形演變原因";
            }

            // 更新進度條文字
            document.getElementById('progressText').innerText = `${currentIndex + 1} / ${currentFilteredList.length}`;
        }

        // 分類過濾切換
        function filterCards(category, event) {
            // 切換按鈕樣式
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            if (event) event.target.classList.add('active');

            // 過濾數據
            if (category === '全部') {
                currentFilteredList = [...fullDatabase];
            } else {
                currentFilteredList = fullDatabase.filter(item => item.type === category);
            }
            
            currentIndex = 0;
            loadCard();
        }

        // 下一張
        function nextCard(e) {
            if(e) e.stopPropagation();
            if (currentFilteredList.length === 0) return;
            currentIndex = (currentIndex + 1) % currentFilteredList.length;
            loadCard();
        }

        // 上一張
        function prevCard(e) {
            if(e) e.stopPropagation();
            if (currentFilteredList.length === 0) return;
            currentIndex = (currentIndex - 1 + currentFilteredList.length) % currentFilteredList.length;
            loadCard();
        }

        // 使用 Web Speech API (TTS) 朗讀日語假名
        function playTTS() {
            const item = currentFilteredList[currentIndex];
            if (!item) return;

            let textToSpeak = item.kana;
            if (item.kana.includes('/') || item.kana.length > 3) {
                textToSpeak = item.romaji; // 遇到長音/促音規則，改朗讀拼音輔助
            }

            const u = new SpeechSynthesisUtterance(textToSpeak);
            u.lang = 'ja-JP';
            u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        // 朗讀日語範例單字
        function playExampleTTS() {
            const item = currentFilteredList[currentIndex];
            if (!item || !item.exJp) return;
            
            const cleanJp = item.exJp.split(' ')[0];
            const u = new SpeechSynthesisUtterance(cleanJp);
            u.lang = 'ja-JP';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        // 監聽鍵盤快捷鍵
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault(); 
                flipCard();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            }
        });

        // 網頁加載完畢後，執行 JSON 檔案讀取
        window.onload = function() {
            fetchDatabase();
        };
    </script>
</body>
</html>
