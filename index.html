<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日語學習閃卡庫</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --primary-hover: #357ABD;
            --bg-color: #F8F9FA;
            --sidebar-bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-sub: #666666;
        }

        body {
            display: flex;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* 左側側邊欄 */
        #sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #E2E8F0;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            box-sizing: border-box;
            box-shadow: 2px 0 8px rgba(0,0,0,0.02);
        }

        #sidebar h3 {
            margin: 0 0 20px 8px;
            font-size: 1.1rem;
            color: var(--text-sub);
            letter-spacing: 1px;
        }

        #menu-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .menu-item {
            padding: 12px 16px;
            background-color: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            color: #4A5568;
            transition: all 0.2s ease;
        }

        .menu-item:hover {
            background-color: #EDF2F7;
            color: var(--text-main);
        }

        .menu-item.active {
            background-color: #EBF8FF;
            color: var(--primary-color);
            border-color: #BEE3F8;
        }

        /* 右側主內容區 */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        /* 字卡容器 */
        .card-wrapper {
            width: 100%;
            max-width: 480px;
            perspective: 1000px; /* 為了未來的翻牌特效預留 */
        }

        .flash-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 320px;
            justify-content: space-between;
            border: 1px solid #E2E8F0;
        }

        /* 字卡內容樣式 */
        .card-header {
            font-size: 0.9rem;
            color: #A0AEC0;
            background: #EDF2F7;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .card-main {
            font-size: 4rem;
            font-weight: bold;
            color: var(--text-main);
            margin: 10px 0;
            cursor: pointer;
        }

        .card-main:hover {
            color: var(--primary-color);
        }

        .card-romaji {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .card-origin {
            font-size: 0.95rem;
            color: var(--text-sub);
            margin-bottom: 15px;
        }

        .card-example {
            border-top: 1px dashed #E2E8F0;
            width: 100%;
            padding-top: 15px;
            margin-top: 10px;
        }

        .ex-jp {
            font-size: 1.1rem;
            font-weight: 500;
            color: #2D3748;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .ex-jp:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        .ex-tw {
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        /* 控制按鈕區 */
        .controls {
            display: flex;
            gap: 16px;
            margin-top: 30px;
            width: 100%;
            max-width: 480px;
            justify-content: space-between;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #E2E8F0;
            color: #4A5568;
        }

        .btn:hover {
            background-color: #CBD5E0;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* 頁碼計數器 */
        #counter {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <!-- 左側側邊欄：動態分類 -->
    <div id="sidebar">
        <h3>學習庫分類</h3>
        <div id="menu-list">
            <!-- 透過 JS 載入 menu.json 後動態生成 -->
        </div>
    </div>

    <!-- 右側內容區面 -->
    <div id="main-content">
        <div class="card-wrapper">
            <div class="flash-card">
                <div>
                    <span id="card-type" class="card-header">分類</span>
                    <!-- 點擊假名可以直接發音 -->
                    <div id="card-kana" class="card-main" onclick="playTTS()">あ</div>
                    <div id="card-romaji" class="card-romaji">romaji</div>
                    <div id="card-origin" class="card-origin">字源說明</div>
                </div>
                
                <div class="card-example">
                    <!-- 點擊例句可以直接發音 -->
                    <div id="card-exJp" class="ex-jp" onclick="playExampleTTS()">例句日文</div>
                    <div id="card-exTw" class="ex-tw">例句中文</div>
                </div>
            </div>
        </div>

        <!-- 底部切換按鈕 -->
        <div class="controls">
            <button class="btn" onclick="prevCard()">上一個</button>
            <button class="btn btn-primary" onclick="playTTS()">發音 (Space)</button>
            <button class="btn" onclick="nextCard()">下一個</button>
        </div>

        <!-- 當前進度計數 -->
        <div id="counter">0 / 0</div>
    </div>

    <script>
        // 全域狀態變數
        let currentData = [];
        let currentIndex = 0;

        // 1. 網頁開啟時，優先讀取選單目錄
        window.addEventListener('DOMContentLoaded', () => {
            fetch('data/menu.json')
                .then(response => {
                    if (!response.ok) throw new Error('找不到 data/menu.json 檔案');
                    return response.json();
                })
                .then(menuData => {
                    renderMenu(menuData);
                    // 預設自動載入第一個分類
                    if (menuData.length > 0) {
                        loadVocabularyFile(menuData[0].file, document.getElementById('menu-list').firstChild);
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('載入選單控制檔失敗，請確認 data/menu.json 是否存在！');
                });
        });

        // 2. 渲染左側選單
        function renderMenu(menuData) {
            const menuList = document.getElementById('menu-list');
            menuList.innerHTML = '';
            
            menuData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.innerText = item.title;
                
                // 點擊分類切換檔案
                div.addEventListener('click', () => {
                    loadVocabularyFile(item.file, div);
                });
                
                menuList.appendChild(div);
            });
        }

        // 3. 動態讀取選定的單字資料庫 JSON
        function loadVocabularyFile(filePath, element) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');

            fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error(`無法載入檔案: ${filePath}`);
                    return response.json();
                })
                .then(data => {
                    currentData = data;
                    currentIndex = 0; // 切換庫時重設回第一張
                    showCard();
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('card-kana').innerText = "❌";
                    document.getElementById('card-romaji').innerText = "讀取失敗";
                    document.getElementById('card-origin').innerText = "請確認檔案路徑與 JSON 格式是否正確。";
                });
        }

        // 4. 將目前的資料渲染到字卡網頁畫面上
        function showCard() {
            if (currentData.length === 0) return;
            const item = currentData[currentIndex];

            // 替換各個欄位內容
            document.getElementById('card-type').innerText = item.type || "未分類";
            document.getElementById('card-kana').innerText = item.kana;
            document.getElementById('card-romaji').innerText = item.romaji;
            
            // 兼容舊格式中的 reason 或 origin 欄位作為說明
            document.getElementById('card-origin').innerText = item.reason || item.origin || "";
            
            document.getElementById('card-exJp').innerText = item.exJp || "";
            document.getElementById('card-exTw').innerText = item.exTw || "";

            // 更新計數器狀態
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${currentData.length}`;
        }

        // 5. 按鈕控制：下一張、上一張
        function nextCard() {
            if (currentData.length === 0) return;
            currentIndex = (currentIndex + 1) % currentData.length;
            showCard();
        }

        function prevCard() {
            if (currentData.length === 0) return;
            currentIndex = (currentIndex - 1 + currentData.length) % currentData.length;
            showCard();
        }

        // 6. Web Speech API 音訊播放 (升級版主體單字發音)
        function playTTS() {
            if (currentData.length === 0) return;
            const item = currentData[currentIndex];
            
            let textToSpeak = item.kana;
        
            // 策略 A：如果是旅遊單字，且例句括號 ( ) 裡有純假名，優先抓這裡的假名來發音！(最精準)
            if (item.exJp) {
                const match = item.exJp.match(/\(([^)]+)\)/);
                if (match && match[1]) {
                    textToSpeak = match[1];
                }
            } 
            // 策略 B：如果是 50 音圖，遇到有斜線 / 的特殊複合規則，才降級讀羅馬拼音
            else if (item.kana.includes('/')) {
                textToSpeak = item.romaji;
            }
        
            const u = new SpeechSynthesisUtterance(textToSpeak);
            u.lang = 'ja-JP';
            u.rate = 0.85; // 速度微調，讓你聽得更清楚
            window.speechSynthesis.speak(u);
        }

        // 7. Web Speech API 音訊播放 (修正後的精準範例單字版)
        function playExampleTTS() {
            if (currentData.length === 0) return;
            const item = currentData[currentIndex];
            if (!item || !item.exJp) return;
            
            let textToSpeak = '';
            
            // 透過正規表達式提取括號 ( ) 內的純假名，確保 100% 發音正確
            const match = item.exJp.match(/\(([^)]+)\)/);
            if (match && match[1]) {
                textToSpeak = match[1]; 
            } else {
                // 若為片假名單字無括號，則退回原邏輯抓第一個空格前的內容
                textToSpeak = item.exJp.split(' ')[0]; 
            }
            
            const u = new SpeechSynthesisUtterance(textToSpeak);
            u.lang = 'ja-JP';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        // 8. 貼心的鍵盤快捷鍵支援：空白鍵發音、左右方向鍵切換字卡
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // 防止空白鍵滾動網頁
                playTTS();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            }
        });
    </script>
</body>
</html>
